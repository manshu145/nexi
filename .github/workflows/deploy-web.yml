name: Deploy web to Cloud Run

# Auto-deploys the @nexigrate/web Cloud Run service on every push to main
# that touches the web app or its workspace dependencies.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: asia-south1
  AR_REPO: nexigrate
  SERVICE: nexigrate-web
  IMAGE_BASENAME: nexigrate-web

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          SHA=${GITHUB_SHA::12}
          echo "tag=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_BASENAME }}:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t ${{ steps.tag.outputs.image }} \
            .

      - name: Push container image
        run: docker push ${{ steps.tag.outputs.image }}

      - name: Deploy revision to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ steps.tag.outputs.image }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --max-instances=3 \
            --cpu=1 --memory=512Mi \
            --set-env-vars=NODE_ENV=production,NEXT_PUBLIC_API_BASE_URL=https://api.nexigrate.com,NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBQuLPo3N9PMWov9sUrp7czVzBix4lPj8M,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=nexigrate-prod.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=nexigrate-prod,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=nexigrate-prod.firebasestorage.app,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=505978726927,NEXT_PUBLIC_FIREBASE_APP_ID=1:505978726927:web:066fb77f927442d1e3117a \
            --quiet
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Deployed ${{ env.SERVICE }} at ${URL}"
