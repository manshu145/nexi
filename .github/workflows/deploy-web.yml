name: Deploy web to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'
      - '.github/workflows/deploy-trigger.txt'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: asia-south1
  GCP_PROJECT: nexigrate-prod
  SERVICE: nexigrate-web
  SA_EMAIL: nexigrate-api@nexigrate-prod.iam.gserviceaccount.com
  # NEXT_PUBLIC_* values are baked into the client JS at BUILD time.
  # Updating these requires a new docker build, not just a Cloud Run env update.
  PUBLIC_API_BASE_URL: https://api.nexigrate.com
  PUBLIC_FIREBASE_API_KEY: AIzaSyBQuLPo3N9PMWov9sUrp7czVzBix4lPj8M
  PUBLIC_FIREBASE_AUTH_DOMAIN: nexigrate-prod.firebaseapp.com
  PUBLIC_FIREBASE_PROJECT_ID: nexigrate-prod
  PUBLIC_FIREBASE_STORAGE_BUCKET: nexigrate-prod.firebasestorage.app
  PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '505978726927'
  PUBLIC_FIREBASE_APP_ID: '1:505978726927:web:066fb77f927442d1e3117a'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: nexigrate-prod

      - name: Create Artifact Registry repo if missing
        run: |
          gcloud artifacts repositories describe nexigrate \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} 2>/dev/null || \
          gcloud artifacts repositories create nexigrate \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --description="Nexigrate container images"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          SHA=${GITHUB_SHA::12}
          echo "image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/nexigrate/web:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build container image (with NEXT_PUBLIC_* baked in)
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ env.PUBLIC_API_BASE_URL }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ env.PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ env.PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ env.PUBLIC_FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ env.PUBLIC_FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ env.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ env.PUBLIC_FIREBASE_APP_ID }} \
            -t ${{ steps.tag.outputs.image }} \
            .

      - name: Push container image
        run: docker push ${{ steps.tag.outputs.image }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ steps.tag.outputs.image }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --max-instances=3 \
            --min-instances=1 \
            --cpu=1 --memory=512Mi \
            --set-env-vars="NODE_ENV=production" \
            --quiet
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT }} --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Deployed at ${URL}"
