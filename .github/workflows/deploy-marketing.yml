name: Deploy marketing site

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

concurrency:
  group: deploy-marketing-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'
  CLOUDFLARE_PROJECT: nexigrate-marketing

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://nexigrate.com
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build marketing site
        working-directory: apps/marketing
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/marketing
          command: >-
            pages deploy ./dist
            --project-name=${{ env.CLOUDFLARE_PROJECT }}
            --branch=${{ github.ref == 'refs/heads/main' && 'main' || github.head_ref }}
            --commit-hash=${{ github.sha }}
            --commit-message="${{ github.event.head_commit.message || github.event.pull_request.title || 'manual deploy' }}"
