name: Deploy marketing site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

concurrency:
  group: deploy-marketing-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'
  CLOUDFLARE_PROJECT: nexigrate-marketing

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile=false

      - run: pnpm build:marketing
        env:
          NODE_ENV: production

      # Diagnostic: dump everything we know about the Cloudflare token + project,
      # then deliberately exit 1 so the failed-logs API can return this output
      # (regular successful-step logs require authenticated API access).
      - name: Diagnose Cloudflare state (will exit 1 to expose logs via failed-logs API)
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          echo ">>> token-set=$([ -n "$TOKEN" ] && echo yes || echo no)"
          echo ">>> account-set=$([ -n "$ACCOUNT" ] && echo yes || echo no)"
          echo ">>> account-id-prefix=${ACCOUNT:0:8}"

          echo ""
          echo ">>> ============ /user/tokens/verify ============"
          curl -s -H "Authorization: Bearer $TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify
          echo ""

          echo ""
          echo ">>> ============ /accounts ============"
          curl -s -H "Authorization: Bearer $TOKEN" \
            https://api.cloudflare.com/client/v4/accounts | head -c 4000
          echo ""

          echo ""
          echo ">>> ============ /accounts/$ACCOUNT/pages/projects ============"
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/pages/projects" | head -c 6000
          echo ""

          echo ""
          echo ">>> ============ deployments for ${CLOUDFLARE_PROJECT} ============"
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/pages/projects/${CLOUDFLARE_PROJECT}/deployments?per_page=5" | head -c 8000
          echo ""

          echo ""
          echo ">>> Diagnostic complete. Forcing exit 1 so logs are visible via failed-logs API."
          exit 1
