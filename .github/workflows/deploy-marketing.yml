name: Deploy marketing site to Cloudflare Pages

# Auto-deploys the marketing site (nexigrate.com) on every push to main that
# touches apps/marketing/**. Also exposed via workflow_dispatch.
#
# Required GitHub Secrets:
#   - CLOUDFLARE_API_TOKEN (must have Account / Cloudflare Pages / Edit
#                           AND User / User Details / Read)
#   - CLOUDFLARE_ACCOUNT_ID
#
# Last verified: 23 May 2026. Token in the repo at that time was returning
# {"success":false,"errors":[{"code":1000,"message":"Invalid API Token"}]}
# from /user/tokens/verify -- the deploy step here will warn (not fail)
# until that's replaced with a token created from the
# "Edit Cloudflare Pages" template at
# https://dash.cloudflare.com/profile/api-tokens.

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Cloudflare Pages branch to deploy to (production = "main")'
        required: false
        default: 'main'
        type: string

concurrency:
  group: deploy-marketing-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'
  CLOUDFLARE_PROJECT: nexigrate-marketing

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile=false

      - run: pnpm build:marketing
        env:
          NODE_ENV: production

      - name: Verify Cloudflare token before deploy
        id: verify
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$ACCOUNT" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not set; skipping deploy."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STATUS=$(curl -s -o /tmp/cf.json -w '%{http_code}' \
            -H "Authorization: Bearer $TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          BODY=$(cat /tmp/cf.json)
          echo "verify HTTP $STATUS"
          echo "$BODY"
          if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q '"success":true'; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Cloudflare token failed verify ($STATUS). Skipping deploy. Body: $BODY"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via local wrangler
        if: steps.verify.outputs.ok == 'true'
        working-directory: apps/marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH: ${{ inputs.branch || 'main' }}
        run: |
          COMMIT_MSG_ONE_LINE="$(printf '%s' "${{ github.event.head_commit.message || github.sha }}" | head -n 1)"
          pnpm exec wrangler pages deploy ./dist \
            --project-name=${CLOUDFLARE_PROJECT} \
            --branch="${BRANCH}" \
            --commit-hash=${{ github.sha }} \
            --commit-message="${COMMIT_MSG_ONE_LINE}"

      - name: Skip-deploy summary
        if: steps.verify.outputs.ok != 'true'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Cloudflare deploy skipped

          The CLOUDFLARE_API_TOKEN GitHub Secret did not pass
          /user/tokens/verify. The build artifact (apps/marketing/dist) is
          ready in this run; nothing was uploaded to Cloudflare.

          Fix in 60 seconds:
          1. https://dash.cloudflare.com/profile/api-tokens -> Create Token.
          2. Use the "Edit Cloudflare Pages" template (auto-grants
             Account/Cloudflare Pages/Edit and User/User Details/Read).
          3. Save and copy the token.
          4. https://github.com/manshu145/nexi/settings/secrets/actions ->
             update CLOUDFLARE_API_TOKEN with the new value.
          5. Actions tab -> "Deploy marketing site to Cloudflare Pages" ->
             "Run workflow".

          Until that's done, only the Cloudflare-side Git auto-deploy will
          publish updates -- and that has its own configuration in the
          Cloudflare dashboard.
          EOF
          echo "::warning::Cloudflare token invalid; deploy skipped. See run summary for the fix."
