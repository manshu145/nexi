name: Scheduled jobs (cron)

# THE "auto cron run" you were missing.
#
# The API exposes several cron-only endpoints (guarded by the x-cron-secret
# header == CRON_SECRET) but nothing was actually CALLING them on a schedule,
# so current affairs never auto-ingested and the daily/streak push nudges
# never fired. This workflow is that scheduler. Same approach as the existing
# backup-firestore.yml (GitHub Actions cron) — no Cloud Scheduler / extra GCP
# setup needed because the only secret required is CRON_SECRET.
#
# ── ONE-TIME SETUP ───────────────────────────────────────────────────────
# Add a repo secret:  Settings → Secrets and variables → Actions → New
#   Name:  CRON_SECRET
#   Value: the SAME value set as CRON_SECRET on the API (Cloud Run env).
# That's it — schedules below start firing automatically.
#
# ── SCHEDULES (GitHub cron is UTC; IST = UTC+5:30) ───────────────────────
#   every 30 min        → current affairs ingestion (RSS → AI summary → Hindi)
#   01:30 UTC (07:00 IST) → daily current-affairs digest push
#   13:30 UTC (19:00 IST) → streak-at-risk reminder push
#   every hour at :15   → re-engagement nudge (idle 5-6h → personalized push)
#   Sat 22:30 UTC (Sun 04:00 IST) → weekly stale-chapter content refresh

on:
  schedule:
    - cron: '*/30 * * * *'  # current-affairs ingest (every 30 min)
    - cron: '30 1 * * *'    # daily-digest  (07:00 IST)
    - cron: '30 13 * * *'   # streak-check  (19:00 IST)
    - cron: '15 * * * *'    # reengage      (hourly at :15)
    - cron: '30 22 * * 6'   # content-refresh (Sun 04:00 IST)
  workflow_dispatch:
    inputs:
      target:
        description: 'Which job to run now'
        type: choice
        required: true
        default: ingest
        options:
          - ingest
          - daily-digest
          - streak-check
          - reengage
          - content-refresh
          - all

concurrency:
  group: cron-jobs-${{ github.event.schedule || github.event.inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  API_BASE: https://api.nexigrate.com

jobs:
  cron:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Decide which endpoint(s) to call
        id: pick
        run: |
          SCHED='${{ github.event.schedule }}'
          TARGET='${{ github.event.inputs.target }}'
          JOBS=""
          if [ -n "$SCHED" ]; then
            case "$SCHED" in
              '*/30 * * * *') JOBS="ingest" ;;
              '30 1 * * *')   JOBS="daily-digest" ;;
              '30 13 * * *')  JOBS="streak-check" ;;
              '15 * * * *')   JOBS="reengage" ;;
              '30 22 * * 6')  JOBS="content-refresh" ;;
              *)              JOBS="ingest" ;;
            esac
          elif [ "$TARGET" = "all" ]; then
            JOBS="ingest daily-digest streak-check reengage content-refresh"
          else
            JOBS="$TARGET"
          fi
          echo "jobs=$JOBS" >> "$GITHUB_OUTPUT"
          echo "Will run: $JOBS"

      - name: Call cron endpoints
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -u
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET repo secret is not set. Add it under Settings → Secrets and variables → Actions (must match the API's CRON_SECRET)."
            exit 1
          fi

          path_for() {
            case "$1" in
              ingest)          echo "/v1/current-affairs/ingest" ;;
              daily-digest)    echo "/v1/notifications/daily-digest" ;;
              streak-check)    echo "/v1/notifications/streak-check" ;;
              reengage)        echo "/v1/notifications/reengage" ;;
              content-refresh) echo "/v1/study/content-refresh" ;;
            esac
          }

          FAIL=0
          for j in ${{ steps.pick.outputs.jobs }}; do
            P="$(path_for "$j")"
            echo "→ POST ${API_BASE}${P}"
            CODE=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X POST "${API_BASE}${P}" \
              -H "x-cron-secret: ${CRON_SECRET}" \
              -H 'content-type: application/json' \
              --max-time 600 || echo "000")
            echo "  HTTP ${CODE}"
            head -c 500 /tmp/resp.json 2>/dev/null || true
            echo ""
            if [ "$CODE" != "200" ]; then
              echo "::error::${j} failed (HTTP ${CODE})"
              FAIL=1
            fi
            echo "- \`${j}\` → HTTP ${CODE}" >> "$GITHUB_STEP_SUMMARY"
          done
          exit $FAIL
