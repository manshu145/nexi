name: Bootstrap admin claim

# Manually-triggered workflow that grants (or revokes) the Firebase
# `admin: true` custom claim on a user identified by email.
#
# Why a workflow and not a Firebase Console button: Firebase Console does
# not expose custom-claim editing in the UI. Custom claims can only be set
# via the firebase-admin SDK with a service-account credential. We already
# store that credential as the GitHub Secret FIREBASE_SERVICE_ACCOUNT_JSON
# (used by the api deploy too), so this workflow re-uses it cleanly.
#
# Trigger: Actions tab -> "Bootstrap admin claim" -> "Run workflow"
# Inputs:
#   email   (required) -- email of the target user
#   revoke  (optional) -- set true to remove the admin claim instead of granting

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email of the Firebase user to grant admin access to'
        required: true
        type: string
      revoke:
        description: 'Tick to REVOKE admin instead of granting'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install firebase-admin
        run: npm install --silent --no-audit --no-fund firebase-admin@13

      - name: Set / revoke custom claim
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          TARGET_EMAIL: ${{ inputs.email }}
          REVOKE: ${{ inputs.revoke }}
        run: |
          cat > set-claim.mjs <<'EOF'
          import admin from 'firebase-admin';

          const saJson = process.env.FIREBASE_SERVICE_ACCOUNT_JSON;
          if (!saJson) {
            console.error('::error::FIREBASE_SERVICE_ACCOUNT_JSON secret is empty');
            process.exit(1);
          }
          const sa = JSON.parse(saJson);

          admin.initializeApp({
            credential: admin.credential.cert(sa),
            projectId: 'nexigrate-prod',
          });

          const email = (process.env.TARGET_EMAIL ?? '').trim().toLowerCase();
          const revoke = process.env.REVOKE === 'true';

          if (!email) {
            console.error('::error::email input is required');
            process.exit(1);
          }

          try {
            const user = await admin.auth().getUserByEmail(email);
            const before = user.customClaims ?? {};
            const next = revoke ? { ...before, admin: false } : { ...before, admin: true };
            await admin.auth().setCustomUserClaims(user.uid, next);

            // Force the user to re-authenticate so their next ID token carries
            // the new claim. Without this they would only see the new claim
            // after their existing token expires (up to 1 hour).
            await admin.auth().revokeRefreshTokens(user.uid);

            const action = revoke ? 'REVOKED admin from' : 'GRANTED admin to';
            console.log(`::notice::${action} ${email} (uid=${user.uid})`);
            console.log('Existing refresh tokens revoked. The user must SIGN OUT and SIGN IN AGAIN at app.nexigrate.com to pick up the new claim.');
            console.log('');
            console.log('Claims before:', JSON.stringify(before));
            console.log('Claims after :', JSON.stringify(next));
          } catch (err) {
            console.error(`::error::Failed: ${err.message}`);
            if (err.code === 'auth/user-not-found') {
              console.error('::error::No Firebase user has that email. Have you signed in to app.nexigrate.com at least once with this address?');
            }
            process.exit(1);
          }
          EOF
          node set-claim.mjs
