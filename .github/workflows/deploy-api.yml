name: Deploy api to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'packages/credits/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: asia-south1
  GCP_PROJECT: nexigrate-prod
  SERVICE: nexigrate-api
  SA_EMAIL: nexigrate-api@nexigrate-prod.iam.gserviceaccount.com

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: nexigrate-prod

      - name: Create Artifact Registry repo if missing
        run: |
          gcloud artifacts repositories describe nexigrate \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} 2>/dev/null || \
          gcloud artifacts repositories create nexigrate \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --description="Nexigrate container images"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          SHA=${GITHUB_SHA::12}
          echo "image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/nexigrate/api:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        run: docker build -f apps/api/Dockerfile -t ${{ steps.tag.outputs.image }} .

      - name: Push container image
        run: docker push ${{ steps.tag.outputs.image }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ steps.tag.outputs.image }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --max-instances=3 \
            --cpu=1 --memory=512Mi \
            --set-env-vars="NODE_ENV=production,AUTH_MODE=firebase,PERSISTENCE=firestore,LOG_JSON=true,GCP_PROJECT_ID=nexigrate-prod,GCP_PROJECT_NUMBER=505978726927,GCP_REGION=asia-south1,GCP_SERVICE_ACCOUNT=${{ env.SA_EMAIL }},CORS_ALLOWED_ORIGINS=https://app.nexigrate.com" \
            --quiet
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT }} --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Deployed at ${URL}"

      - name: Smoke-test /healthz
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/healthz" || true)
            [ "$STATUS" = "200" ] && echo "OK on attempt $i" && exit 0
            echo "Attempt $i: $STATUS"; sleep 5
          done
          exit 1
