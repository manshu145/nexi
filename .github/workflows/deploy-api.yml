name: Deploy api to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'packages/credits/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: asia-south1
  GCP_PROJECT: nexigrate-prod
  SERVICE: nexigrate-api
  SA_EMAIL: nexigrate-api@nexigrate-prod.iam.gserviceaccount.com

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: nexigrate-prod

      - name: Create Artifact Registry repo if missing
        run: |
          gcloud artifacts repositories describe nexigrate \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} 2>/dev/null || \
          gcloud artifacts repositories create nexigrate \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --description="Nexigrate container images"

      - name: Enable required GCP APIs (idempotent)
        run: |
          gcloud services enable \
            firestore.googleapis.com \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            iam.googleapis.com \
            iamcredentials.googleapis.com \
            clouderrorreporting.googleapis.com \
            logging.googleapis.com \
            monitoring.googleapis.com \
            secretmanager.googleapis.com \
            --project=${{ env.GCP_PROJECT }}

      - name: Ensure Firestore database exists (Native mode, asia-south1)
        run: |
          if gcloud firestore databases describe \
              --database='(default)' \
              --project=${{ env.GCP_PROJECT }} >/dev/null 2>&1; then
            echo "Firestore (default) database already present."
          else
            echo "Creating Firestore (default) database in ${{ env.GCP_REGION }}..."
            gcloud firestore databases create \
              --database='(default)' \
              --location=${{ env.GCP_REGION }} \
              --type=firestore-native \
              --project=${{ env.GCP_PROJECT }}
          fi

      - name: Grant runtime SA access to Firestore + logging (idempotent)
        run: |
          for ROLE in roles/datastore.user roles/logging.logWriter roles/monitoring.metricWriter roles/errorreporting.writer roles/secretmanager.secretAccessor; do
            gcloud projects add-iam-policy-binding ${{ env.GCP_PROJECT }} \
              --member="serviceAccount:${{ env.SA_EMAIL }}" \
              --role="$ROLE" \
              --condition=None \
              --quiet >/dev/null
            echo "Granted $ROLE to ${{ env.SA_EMAIL }}"
          done

      - name: Bootstrap Razorpay secrets in Secret Manager (if GH secret present)
        id: razorpay
        env:
          RZ_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RZ_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$RZ_KEY_SECRET" ]; then
            echo "RAZORPAY_KEY_SECRET not set in GitHub Secrets; skipping billing wiring."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # razorpay-key-secret
          if ! gcloud secrets describe razorpay-key-secret --project=${{ env.GCP_PROJECT }} >/dev/null 2>&1; then
            gcloud secrets create razorpay-key-secret \
              --replication-policy=automatic \
              --project=${{ env.GCP_PROJECT }}
          fi
          printf '%s' "$RZ_KEY_SECRET" | gcloud secrets versions add razorpay-key-secret \
            --data-file=- --project=${{ env.GCP_PROJECT }} >/dev/null

          # razorpay-webhook-secret (optional; falls back to empty if not provided)
          if ! gcloud secrets describe razorpay-webhook-secret --project=${{ env.GCP_PROJECT }} >/dev/null 2>&1; then
            gcloud secrets create razorpay-webhook-secret \
              --replication-policy=automatic \
              --project=${{ env.GCP_PROJECT }}
          fi
          printf '%s' "${RZ_WEBHOOK_SECRET:-not_set}" | gcloud secrets versions add razorpay-webhook-secret \
            --data-file=- --project=${{ env.GCP_PROJECT }} >/dev/null

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Razorpay secrets present in Secret Manager."

      - name: Bootstrap AI provider secrets in Secret Manager (Phase 4 M5)
        id: ai
        env:
          OAI: ${{ secrets.OPENAI_API_KEY }}
          GEM: ${{ secrets.GEMINI_API_KEY }}
          GRQ: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Helper: create-or-update a secret if the value is non-empty.
          # Skip silently when the GitHub Secret is unset, so the deploy
          # works on first contact even before all three providers have keys.
          upsert_secret () {
            local NAME="$1"
            local VALUE="$2"
            if [ -z "$VALUE" ]; then
              echo "  $NAME: GitHub secret empty, skipping"
              return
            fi
            if ! gcloud secrets describe "$NAME" --project=${{ env.GCP_PROJECT }} >/dev/null 2>&1; then
              gcloud secrets create "$NAME" \
                --replication-policy=automatic \
                --project=${{ env.GCP_PROJECT }} >/dev/null
            fi
            printf '%s' "$VALUE" | gcloud secrets versions add "$NAME" \
              --data-file=- --project=${{ env.GCP_PROJECT }} >/dev/null
            echo "  $NAME: upserted"
          }

          upsert_secret openai-api-key "$OAI"
          upsert_secret gemini-api-key "$GEM"
          upsert_secret groq-api-key   "$GRQ"

          # Build the comma-separated --set-secrets fragment using only the
          # keys that are present, so missing ones don't break the deploy.
          AI_SECRETS=""
          [ -n "$OAI" ] && AI_SECRETS="${AI_SECRETS}OPENAI_API_KEY=openai-api-key:latest,"
          [ -n "$GEM" ] && AI_SECRETS="${AI_SECRETS}GEMINI_API_KEY=gemini-api-key:latest,"
          [ -n "$GRQ" ] && AI_SECRETS="${AI_SECRETS}GROQ_API_KEY=groq-api-key:latest,"
          AI_SECRETS="${AI_SECRETS%,}"
          echo "secrets=${AI_SECRETS}" >> "$GITHUB_OUTPUT"
          if [ -n "$AI_SECRETS" ]; then
            echo "AI providers wired: ${AI_SECRETS}"
          else
            echo "::warning::No AI provider keys present; admin /v1/admin/mcq-drafts/generate will return 503"
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          SHA=${GITHUB_SHA::12}
          echo "image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/nexigrate/api:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        run: docker build -f apps/api/Dockerfile -t ${{ steps.tag.outputs.image }} .

      - name: Push container image
        run: docker push ${{ steps.tag.outputs.image }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          # Use the ^|^ delimiter override so commas inside values
          # (notably CORS_ALLOWED_ORIGINS) don't get parsed as separators.
          BASE_ENV="^|^NODE_ENV=production|AUTH_MODE=firebase|PERSISTENCE=firestore|LOG_JSON=true|GCP_PROJECT_ID=nexigrate-prod|GCP_PROJECT_NUMBER=505978726927|GCP_REGION=asia-south1|GCP_SERVICE_ACCOUNT=${{ env.SA_EMAIL }}|CORS_ALLOWED_ORIGINS=https://app.nexigrate.com,https://nexigrate.com"
          DEPLOY_ARGS=(
            run deploy ${{ env.SERVICE }}
            --image=${{ steps.tag.outputs.image }}
            --region=${{ env.GCP_REGION }}
            --project=${{ env.GCP_PROJECT }}
            --platform=managed
            --allow-unauthenticated
            --service-account=${{ env.SA_EMAIL }}
            --max-instances=3
            --min-instances=1
            --cpu=1 --memory=512Mi
            --quiet
          )
          # Compose the --set-secrets value: Razorpay (when present) joined
          # with AI providers (only the keys that have GitHub Secrets).
          # We always pass --set-secrets if either group has values, so a
          # missing key NEVER blocks the deploy; the admin endpoint will
          # report 503 with a clear message until the operator adds the
          # corresponding GH Secret and re-runs the workflow.
          SECRETS_LIST=""
          if [ "${{ steps.razorpay.outputs.enabled }}" = "true" ]; then
            SECRETS_LIST="RAZORPAY_KEY_SECRET=razorpay-key-secret:latest,RAZORPAY_WEBHOOK_SECRET=razorpay-webhook-secret:latest"
          fi
          if [ -n "${{ steps.ai.outputs.secrets }}" ]; then
            if [ -n "$SECRETS_LIST" ]; then
              SECRETS_LIST="${SECRETS_LIST},${{ steps.ai.outputs.secrets }}"
            else
              SECRETS_LIST="${{ steps.ai.outputs.secrets }}"
            fi
          fi

          if [ "${{ steps.razorpay.outputs.enabled }}" = "true" ]; then
            ENV_VARS="${BASE_ENV}|RAZORPAY_KEY_ID=rzp_test_SsPfzbJUMaK7Ow"
          else
            ENV_VARS="${BASE_ENV}"
          fi

          if [ -n "$SECRETS_LIST" ]; then
            gcloud "${DEPLOY_ARGS[@]}" \
              --set-env-vars="${ENV_VARS}" \
              --set-secrets="${SECRETS_LIST}"
          else
            gcloud "${DEPLOY_ARGS[@]}" \
              --set-env-vars="${ENV_VARS}"
          fi
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT }} --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Deployed at ${URL}"

      - name: Smoke-test API root
        run: |
          # Cloud Run revisions can take 30-60s to become routable when
          # secrets/env are reshaped. Try /healthz first then fall back to /
          # which has always returned the service descriptor.
          URL='${{ steps.deploy.outputs.url }}'
          for i in $(seq 1 10); do
            HZ=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/healthz" || true)
            ROOT=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/" || true)
            if [ "$HZ" = "200" ] || [ "$ROOT" = "200" ]; then
              echo "OK on attempt $i (healthz=$HZ root=$ROOT)"
              exit 0
            fi
            echo "Attempt $i: healthz=$HZ root=$ROOT"
            sleep 6
          done
          # Don't fail the deploy on smoke-test alone -- the deploy itself
          # already succeeded above; the post-deploy probe is best-effort.
          echo "::warning::Smoke-test never reached 200 in 60s; check Cloud Run logs."

      - name: Deploy Firestore rules + indexes (idempotent)
        working-directory: infra/firebase
        run: |
          npm install -g firebase-tools@latest --silent
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project nexigrate-prod \
            --non-interactive
