name: Deploy Firebase rules and indexes

# Pushes Firestore security rules + indexes and Cloud Storage rules to the
# nexigrate-prod Firebase project on every push to main that touches them.

on:
  push:
    branches: [main]
    paths:
      - 'infra/firebase/firestore.rules'
      - 'infra/firebase/firestore.indexes.json'
      - 'infra/firebase/storage.rules'
      - 'infra/firebase/firebase.json'
      - '.github/workflows/deploy-firebase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-firebase-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: nexigrate-prod

      - name: Deploy Firestore rules + indexes
        working-directory: infra/firebase
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project nexigrate-prod \
            --non-interactive
